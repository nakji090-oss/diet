<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주간 운동 트래커</title>
    <style>
        /* 기본 스타일 */
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 1.4rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        /* 요일별 카드 스타일 */
        .day-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }
        .day-card.type-full { background-color: #f8fafc; border-left: 5px solid #3b82f6; }
        .day-card.type-cardio { background-color: #f0fdf4; border-left: 5px solid #22c55e; }
        .day-card.type-rest { background-color: #fdf2f8; border-left: 5px solid #ec4899; }
        
        .day-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
        }
        /* 체크박스 및 라벨 */
        .task {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .task:last-child { margin-bottom: 0; }
        
        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            accent-color: #3b82f6;
            cursor: pointer;
            flex-shrink: 0;
        }
        label {
            cursor: pointer;
            font-size: 0.95rem;
            color: #475569;
            flex-grow: 1;
            line-height: 1.3;
        }
        .task.completed label {
            text-decoration: line-through;
            color: #94a3b8;
        }
        .sub-task { padding-left: 12px; }
        .sub-task label { font-size: 0.9rem; color: #334155; }
        
        /* 버튼 및 진행률 */
        .reset-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .progress-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 8px;
            margin-bottom: 15px;
            height: 14px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: #3b82f6;
            width: 0%;
            transition: width 0.4s ease;
        }
        .progress-text {
            text-align: right;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>최낙훈님의 하이브리드<br>운동 트래커 🏃‍♂️</h1>
    
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">주간 달성률: 0%</div>

    <div id="app"></div>
    
    <button class="reset-btn" onclick="resetData()">새로운 한 주 시작하기</button>
</div>

<script>
    // 요일별 맞춤형 루틴 데이터
    const fullRoutine = [
        { name: '🔥 워밍업 (관절 풀기 / 5분)', type: 'main' },
        { name: '🦵 하체: 스쿼트 & 런지 3세트', type: 'sub' },
        { name: '💪 상체(앞): 푸시업 3세트', type: 'sub' },
        { name: '🦇 상체(뒤): 슈퍼맨 자세 3세트', type: 'sub' },
        { name: '🧱 코어: 플랭크 1분 x 3세트', type: 'sub' },
        { name: '👟 유산소: 조깅 (아파트 뜰 / 20분)', type: 'main' },
        { name: '🧘 쿨다운 스트레칭 (5분)', type: 'main' }
    ];

    const cardioRoutine = [
        { name: '🔥 워밍업 (동적 스트레칭 / 5분)', type: 'main' },
        { name: '🫀 존2 러닝 (대화 가능한 수준의 심박수 / 40~60분)', type: 'main' },
        { name: '🧘 쿨다운 스트레칭 (5분)', type: 'main' }
    ];

    const restRoutine = [
        { name: '🛌 완전 휴식 또는 폼롤러 마사지', type: 'main' }
    ];

    const weeklyPlan = [
        { day: '월요일 (전신 근력 + 조깅)', class: 'type-full', tasks: fullRoutine },
        { day: '화요일 (존2 러닝 집중)', class: 'type-cardio', tasks: cardioRoutine },
        { day: '수요일 (전신 근력 + 조깅)', class: 'type-full', tasks: fullRoutine },
        { day: '목요일 (존2 러닝 집중)', class: 'type-cardio', tasks: cardioRoutine },
        { 리day: '금요일 (전신 근력 + 조깅)', class: 'type-full', tasks: fullRoutine },
        { day: '토요일 (존2 러닝 집중)', class: 'type-cardio', tasks: cardioRoutine },
        { day: '일요일 (휴식 및 회복)', class: 'type-rest', tasks: restRoutine }
    ];

    const appDiv = document.getElementById('app');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    function renderApp() {
        appDiv.innerHTML = '';
        let totalTasks = 0;
        let completedTasks = 0;

        weeklyPlan.forEach((dayPlan, dayIndex) => {
            const dayCard = document.createElement('div');
            dayCard.className = `day-card ${dayPlan.class}`;
            
            const dayTitle = document.createElement('div');
            dayTitle.className = 'day-title';
            dayTitle.innerText = dayPlan.day || dayPlan.리day; // 오타 방지
            dayCard.appendChild(dayTitle);

            dayPlan.tasks.forEach((task, taskIndex) => {
                totalTasks++;
                const uniqueId = `task-${dayIndex}-${taskIndex}`;
                const isChecked = localStorage.getItem(uniqueId) === 'true';
                
                if (isChecked) completedTasks++;

                const taskDiv = document.createElement('div');
                taskDiv.className = `task ${isChecked ? 'completed' : ''} ${task.type === 'sub' ? 'sub-task' : ''}`;

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = uniqueId;
                checkbox.checked = isChecked;
                
                checkbox.addEventListener('change', (e) => {
                    localStorage.setItem(uniqueId, e.target.checked);
                    renderApp(); 
                });

                const label = document.createElement('label');
                label.htmlFor = uniqueId;
                label.innerText = task.name;

                taskDiv.appendChild(checkbox);
                taskDiv.appendChild(label);
                dayCard.appendChild(taskDiv);
            });

            appDiv.appendChild(dayCard);
        });

        const progressPercentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
        progressBar.style.width = progressPercentage + '%';
        progressText.innerText = `주간 달성률: ${progressPercentage}%`;
    }

    function resetData() {
        if(confirm('이번 주 운동 기록을 모두 초기화하시겠습니까?')) {
            weeklyPlan.forEach((dayPlan, dayIndex) => {
                dayPlan.tasks.forEach((task, taskIndex) => {
                    localStorage.removeItem(`task-${dayIndex}-${taskIndex}`);
                });
            });
            renderApp();
        }
    }

    renderApp();
</script>

</body>
</html>
